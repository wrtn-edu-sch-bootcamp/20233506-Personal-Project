services:
  - type: web
    name: safehome-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: REAL_ESTATE_API_KEY
        sync: false
      - key: KAKAO_API_KEY
        sync: false
      - key: APP_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.11"
